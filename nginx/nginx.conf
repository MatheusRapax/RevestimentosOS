events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Basic Settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Upstreams
    upstream backend_api {
        # 'backend' is the docker container name
        server backend:3000;
    }

    upstream frontend_app {
        # 'frontend' is the docker container name
        server frontend:3001;
    }

    server {
        listen 80;
        server_name _; 

        # Proxy headers for all locations
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Route Backend API requests
        # Any request starting with /api/ will go to the NestJS backend
        location /api/ {
            # Remove `/api` prefix because NestJS doesn't have a global 'api' prefix
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass http://backend_api;
        }

        # 2. Route all other requests to Next.js Frontend
        location / {
            proxy_pass http://frontend_app;
            
            # WebSocket support for Next.js hot reload (if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
