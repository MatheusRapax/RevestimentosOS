version: '3.8'

services:
  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revestimentos-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      # Database URL should be provided by Coolify Environment Variables
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3000
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && npm run build && npm run start:prod"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.revestimentos-backend-prod.loadbalancer.server.port=3000"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health", "||", "exit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    build:
      context: ./clinicos-web
      dockerfile: Dockerfile
    container_name: revestimentos-frontend-prod
    restart: always
    env_file:
      - ./clinicos-web/.env.local
    environment:
      # URL to reach backend from user browser
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      # URL to reach backend from Next.js SSR (Docker internal network)
      INTERNAL_API_URL: http://backend:3000
      NODE_ENV: production
    depends_on:
      - backend
    command: sh -c "npm run build && npm start"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.revestimentos-frontend-prod.loadbalancer.server.port=3001"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/api/health", "||", "exit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  coolify:
    external: true
