version: '3.8'

services:
  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revestimentos-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      # Database URL should be provided by Coolify Environment Variables
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      PORT: 3000
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && npm run build && npm run start:prod"
    networks:
      - coolify

  # Next.js Frontend
  frontend:
    build:
      context: ./clinicos-web
      dockerfile: Dockerfile
    container_name: revestimentos-frontend-prod
    restart: always
    env_file:
      - ./clinicos-web/.env.local
    environment:
      # URL to reach backend from user browser
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      # URL to reach backend from Next.js SSR (Docker internal network)
      INTERNAL_API_URL: http://backend:3000
      NODE_ENV: production
    depends_on:
      - backend
    command: sh -c "npm run build && npm start"
    networks:
      - coolify

networks:
  coolify:
    external: true
